spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      idle-timeout: 30000
      pool-name: HikariPool-1
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update   # create, update, validate, create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

llama:
  api:
    url: "http://localhost:11434"  # base URL; change as needed
    endpoint: "/api/generate"
    headers:
      Content-Type: "application/json"
  prompt: "Translate the following text to the target language: {{text}}"
  model:
    name: "llama3"
  stream: false
